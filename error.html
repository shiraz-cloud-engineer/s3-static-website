<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Mono', monospace;
      background: #0a0a0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .wrapper { position: relative; z-index: 1; padding: 2rem; }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      color: #ff6b35;
      opacity: 0.15;
      letter-spacing: -0.05em;
    }
    .msg {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: -1rem;
      margin-bottom: 1rem;
    }
    .sub { font-size: 0.85rem; color: #888; margin-bottom: 2.5rem; }
    a {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid #ff6b35;
      color: #ff6b35;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    a:hover { background: rgba(255,107,53,0.1); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="code">404</div>
    <div class="msg">Page Not Found</div>
    <p class="sub">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/index.html">← Back to Home</a>
  </div>
</body>
</html>
